<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Rahtaaa 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{
background:linear-gradient(-45deg,#000,#021a35,#000,#032b55);
background-size:400% 400%;
animation:bg 15s infinite;
color:white;overflow-x:hidden}
@keyframes bg{
0%{background-position:0 50%}
50%{background-position:100% 50%}
100%{background-position:0 50%}
}

#overlayStart{
position:fixed;inset:0;background:#000;
display:flex;justify-content:center;align-items:center;
z-index:9999;text-align:center;cursor:pointer}
.startBox h1{font-size:38px}
.startBox p{opacity:.7}

.heart{position:fixed;bottom:-10px;font-size:20px;color:#3ba4ff;animation:float 6s linear infinite}
@keyframes float{to{transform:translateY(-110vh);opacity:0}}

section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px;opacity:0;transform:translateY(40px);transition:1s}
.show{opacity:1;transform:translateY(0)}

h1{font-size:42px;background:linear-gradient(45deg,#3ba4ff,#ff4da6);-webkit-background-clip:text;color:transparent}
button{padding:15px 30px;border:none;border-radius:30px;font-size:18px;background:linear-gradient(45deg,#3ba4ff,#ff4da6);color:white;cursor:pointer;margin-top:20px}

.letter-section{
background:radial-gradient(circle at 20% 20%, rgba(0,150,255,.25), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,77,166,.15), transparent 40%),
linear-gradient(180deg,#021a35,#000);
}
.paper{
max-width:780px;padding:60px;border-radius:25px;
background:linear-gradient(#fff,#f6fbff);
color:#111;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.paper h1{font-family:'Great Vibes';font-size:48px;color:#0b3b78}
.letter-text{font-family:'Playfair Display';line-height:2;white-space:pre-wrap}

/* LOVE GRID */
.love{
display:grid;
grid-template-columns:repeat(17,36px);
grid-template-rows:repeat(13,36px);
gap:6px;margin-top:30px;
}
.love img{
width:36px;height:36px;
border-radius:10px;
object-fit:cover;
opacity:0;
transform:scale(.3);
transition:1s;
box-shadow:0 0 8px rgba(255,0,90,.4);
}

.card{background:#0a1f3f;padding:25px;border-radius:20px;margin:10px}
.slide{display:none}.active{display:block}
</style>
</head>

<body>

<div id="overlayStart" onclick="startWebsite()">
<div class="startBox">
<h1>Tap to start 💙</h1>
<p>special birthday website for bubub ✨</p>
</div>
</div>

<audio id="music"></audio>

<section class="reveal">
<h1>Happy Birthday Bubub 💙</h1>
<p>30 April 2026 • 19 Years Old 🎂</p>
<button onclick="document.getElementById('msg').scrollIntoView({behavior:'smooth'})">Open Surprise ✨</button>
</section>

<section id="msg" class="letter-section reveal">
<div class="paper">
<h1>For Rahtaaa 🤍</h1>
<div class="letter-text" id="typingText"></div>
</div>
</section>

<section class="reveal">
<h1>Our Memories 📸</h1>
<div class="love"></div>
</section>

<section class="reveal">
<h1>Our Love Wrapped 🎧</h1>
<div class="card slide active">Days Together 💙<h1>365+</h1></div>
<div class="card slide">Laughs Shared 😂<h1>∞</h1></div>
<div class="card slide">Love Level 💙<h1>1000%</h1></div>
</section>

<section class="reveal">
<h1>Thank you for existing 💙</h1>
<p>– Nafiis</p>
</section>

<script>
/* ===== ULTRA MUSIC FIX (ANTI STUCK) ===== */
const music = document.getElementById("music");
let currentTrack = "";
let audioUnlocked = false;

// unlock audio setelah user tap pertama
document.body.addEventListener("click", () => {
  if(audioUnlocked) return;
  music.volume = 0;
  music.play().then(()=>{
    music.pause();
    music.currentTime = 0;
    music.volume = 1;
    audioUnlocked = true;
    console.log("Audio unlocked 🔓");
  }).catch(()=>{});
},{once:true});

function playMusic(src){
  if(currentTrack === src) return;
  currentTrack = src;

  music.src = src;
  music.load();

  const playPromise = music.play();
  if(playPromise !== undefined){
    playPromise.catch(()=>console.log("Autoplay blocked, waiting user interaction"));
  }
}

function startWebsite(){
  document.getElementById("overlayStart").style.display = "none";
  setTimeout(()=>playMusic("music1.mp3"),300);
}

const sections=document.querySelectorAll("section");
let memoryMusicStarted=false;
const obsMusic=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
 if(!entry.isIntersecting)return;
 let index=[...sections].indexOf(entry.target);
 if(index===0) playMusic("music1.mp3");
 else if(index===1) playMusic("music2.mp3");
 else if(index>=2 && !memoryMusicStarted){memoryMusicStarted=true;playMusic("music3.mp3");}
});
},{threshold:0.6});
sections.forEach(sec=>obsMusic.observe(sec));

setInterval(()=>{
let h=document.createElement("div");
h.className="heart";h.innerHTML="💙";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},400);

let obs=new IntersectionObserver(e=>e.forEach(x=>x.isIntersecting&&x.target.classList.add("show")));
document.querySelectorAll(".reveal").forEach(el=>obs.observe(el));

/* TYPEWRITER FULL */
const textElement=document.getElementById("typingText");
const msg=`Happy 19th Birthday bubub 🤍🎂 Hari ini kamu resmi 19 tahun. Kedengarannya cuma angka, tapi aku tau perjalanan kamu sampai di titik ini nggak selalu gampang. Makasih ya sudah kuat sejauh ini, sudah bertahan, sudah terus berusaha walaupun capek, walaupun kadang ragu sama diri sendiri.

Aku cuma mau bilang makasih karena kamu selalu kuat, selalu berusaha, dan selalu jalan terus walaupun capek. Aku bangga banget sama kamu 🤍

Sekarang kamu lagi di fase kerja, belajar hal baru, ketemu tantangan baru, dan mungkin kadang ngerasa dunia cepat banget jalannya. Tapi percaya deh, kamu lagi ada di jalur yang tepat. Pelan-pelan aja, step by step. You don’t have to rush, you just have to keep going.

Semoga kerja kamu selalu lancar, rezekinya makin luas, dan kamu selalu dikelilingi hal-hal baik. Kalau capek, ingat kamu nggak sendirian.

You are doing so well. I know life is not always easy, but you keep going and I'm really proud of you.

Semoga semua mimpi kamu pelan-pelan jadi nyata ✨ Semoga setiap hari kamu punya alasan untuk senyum 😊

Thank you for being you. Thank you for existing in my life.

I hope this year brings you more happiness, success, and many beautiful moments.

Happy birthday once again 🥳 I’m always rooting for you 💙 I love you more than yesterday and less than tomorrow 💙`;
let i=0;
function typeWriter(){ if(i < msg.length){ textElement.textContent += msg.charAt(i); i++; setTimeout(typeWriter,35);} }
setTimeout(typeWriter,1200);

/* LOVE SHAPE RANDOM FILL */
const memorySection=document.querySelector(".love");
const TOTAL_PHOTO=20;
function randomPhoto(){return Math.floor(Math.random()*TOTAL_PHOTO)+1;}

const heartMap=[
"00111110001111100",
"01111111011111110",
"11111111111111111",
"11111111111111111",
"11111111111111111",
"01111111111111110",
"00111111111111100",
"00011111111111000",
"00001111111110000",
"00000111111100000",
"00000011111000000",
"00000001110000000",
"00000000100000000"
];

let positions=[];
heartMap.forEach((row,y)=>{
 row.split("").forEach((cell,x)=>{
  if(cell==="1") positions.push({x,y});
 });
});

positions.forEach((pos,i)=>{
 let img=document.createElement("img");
 img.src=`foto/foto${randomPhoto()}.jpg`;
 img.style.gridColumn=pos.x+1;
 img.style.gridRow=pos.y+1;
 memorySection.appendChild(img);
});

const photos=document.querySelectorAll(".love img");
const delay=30000/photos.length;
photos.forEach((img,i)=>{
 setTimeout(()=>{img.style.opacity="1";img.style.transform="scale(1)";}, i*delay);
});

let slides=document.querySelectorAll(".slide"),s=0;
setInterval(()=>{slides[s].classList.remove("active");s=(s+1)%slides.length;slides[s].classList.add("active")},3000);
</script>
</body>
</html>
