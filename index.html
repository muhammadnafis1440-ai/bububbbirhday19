<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Poppins;
  background:linear-gradient(120deg,#0f2a44,#1e4e79);
  color:white;
  overflow-x:hidden;
}
section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:30px;
}
audio{display:none}

/* KERTAS PUTIH */
.letter{
  background:#ffffff;
  color:#333;
  max-width:750px;
  padding:40px;
  border-radius:12px;
  box-shadow:0 0 40px rgba(0,0,0,.3);
  font-family:'Playfair Display';
  line-height:1.9;
}

.typing span{
  opacity:0;
  animation:show 0.05s forwards;
}
@keyframes show{to{opacity:1}}

/* LOVE PATTERN LEBIH BESAR */
.heart-grid{
  display:grid;
  grid-template-columns:repeat(9,95px);
  gap:12px;
  margin-top:40px;
}
.heart-grid img{
  width:95px;height:95px;
  object-fit:cover;
  border-radius:18px;
  opacity:0;
  transform:scale(.3);
  transition:1.5s;
}
.heart-grid img.show{
  opacity:1;
  transform:scale(1);
}
</style>
</head>

<body>

<audio id="music1" src="music/music1.mp3" loop></audio>
<audio id="music2" src="music/music2.mp3" loop></audio>
<audio id="music3" src="music/music3.mp3"></audio>

<section onclick="startMusic()">
<h1>Tap to start 💙</h1>
<p>special birthday website for bubub ✨</p>
</section>

<section>
<div class="letter typing" id="text"></div>
</section>

<section>
<h1>Our Memories 📸</h1>
<div class="heart-grid" id="heart">
<img src="photo/1.jpg"><img src="photo/2.jpg"><img src="photo/3.jpg">
<img src="photo/4.jpg"><img src="photo/5.jpg"><img src="photo/6.jpg">
<img src="photo/7.jpg"><img src="photo/8.jpg"><img src="photo/9.jpg">
<img src="photo/10.jpg"><img src="photo/11.jpg"><img src="photo/12.jpg">
<img src="photo/13.jpg"><img src="photo/14.jpg"><img src="photo/15.jpg">
</div>
</section>

<script>
/* TEXT TIDAK DIUBAH */
const text=`Happy 19th Birthday bubub 🤍🎂  Hari ini kamu resmi 19 tahun. Kedengarannya cuma angka, tapi aku tau perjalanan kamu sampai di titik ini nggak selalu gampang. Makasih ya sudah kuat sejauh ini, sudah bertahan, sudah terus berusaha walaupun capek, walaupun kadang ragu sama diri sendiri.

Aku cuma mau bilang makasih karena kamu selalu kuat, selalu berusaha, dan selalu jalan terus walaupun capek. Aku bangga banget sama kamu 🤍

Sekarang kamu lagi di fase kerja, belajar hal baru, ketemu tantangan baru, dan mungkin kadang ngerasa dunia cepat banget jalannya. Tapi percaya deh, kamu lagi ada di jalur yang tepat. Pelan-pelan aja, step by step. You don’t have to rush, you just have to keep going.

Semoga kerja kamu selalu lancar, rezekinya makin luas, dan kamu selalu dikelilingi hal-hal baik. Kalau capek, ingat kamu nggak sendirian.

You are doing so well. I know life is not always easy, but you keep going and I'm really proud of you.

Semoga semua mimpi kamu pelan-pelan jadi nyata ✨ Semoga setiap hari kamu punya alasan untuk senyum 😊

Thank you for being you. Thank you for existing in my life.

I hope this year brings you more happiness, success, and many beautiful moments.

Happy birthday once again 🥳 I’m always rooting for you 💙 I love you more than yesterday and less than tomorrow 💙`;

let i=0;
function type(){
 if(i<text.length){
  document.getElementById("text").innerHTML+=`<span style="animation-delay:${i*0.03}s">${text[i]}</span>`;
  i++;
  setTimeout(type,30);
 }
}
type();

/* MUSIC — HANYA MUSIC3 YANG TIDAK RESTART */
function startMusic(){
  music1.play();
}

/* play music3 sekali saat masuk memory */
let played=false;
window.addEventListener("scroll",()=>{
  const mem=document.getElementById("heart").getBoundingClientRect().top;
  if(mem<window.innerHeight && !played){
    music3.play();
    played=true;
  }
});

/* FOTO MUNCUL 1 PER 1 ±30 DETIK */
const photos=document.querySelectorAll("#heart img");
let delay=0;
photos.forEach(img=>{
  setTimeout(()=>img.classList.add("show"),delay);
  delay+=2000;
});
</script>

</body>
</html>
